# Render Blueprint — backend API + PostgreSQL
# Docs: https://render.com/docs/blueprint-spec
databases:
  - name: corebuild-salary-db
    plan: free
    databaseName: corebuild_salary
    user: corebuild

services:
  - type: web
    name: corebuild-salary-api
    runtime: node
    plan: free
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: corebuild-salary-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: CLIENT_URL
        sync: false
      - key: PG_SSL
        value: 'true'
