# Deploy to MonsterASP.NET via WebDeploy
# Docs: https://help.monsterasp.net/books/github/page/how-to-deploy-website-via-github-actions
name: Deploy to MonsterASP.NET

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build_and_deploy:
    runs-on: windows-latest
    env:
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
      CLIENT_URL: ${{ secrets.CLIENT_URL }}
      MONSTERASP_WEBSITE_NAME: ${{ secrets.MONSTERASP_WEBSITE_NAME }}
      MONSTERASP_SERVER_COMPUTER_NAME: ${{ secrets.MONSTERASP_SERVER_COMPUTER_NAME }}
      MONSTERASP_SERVER_USERNAME: ${{ secrets.MONSTERASP_SERVER_USERNAME }}
      MONSTERASP_SERVER_PASSWORD: ${{ secrets.MONSTERASP_SERVER_PASSWORD }}
    steps:
      - name: Validate required secrets
        shell: pwsh
        run: |
          $missing = @()
          if (-not $env:JWT_SECRET) { $missing += 'JWT_SECRET' }
          if (-not $env:MONSTERASP_WEBSITE_NAME) { $missing += 'MONSTERASP_WEBSITE_NAME' }
          if (-not $env:MONSTERASP_SERVER_USERNAME) { $missing += 'MONSTERASP_SERVER_USERNAME' }
          if (-not $env:MONSTERASP_SERVER_PASSWORD) { $missing += 'MONSTERASP_SERVER_PASSWORD' }
          if ($missing.Count -gt 0) {
            Write-Error @"
          Missing GitHub Actions secrets. Add them at:
          Repository → Settings → Secrets and variables → Actions → New repository secret

          Required:
            JWT_SECRET
            MONSTERASP_WEBSITE_NAME       e.g. site71031
            MONSTERASP_SERVER_USERNAME    e.g. site71031 (same as website name)
            MONSTERASP_SERVER_PASSWORD    WebDeploy password ONLY (from MonsterASP panel)

          Optional:
            CLIENT_URL
            MONSTERASP_SERVER_COMPUTER_NAME  (auto-built from website name if omitted)

          Missing now: $($missing -join ', ')
          "@
          }
          # Trim accidental spaces/newlines from copy-paste
          echo "MONSTERASP_WEBSITE_NAME=$($env:MONSTERASP_WEBSITE_NAME.Trim())" >> $env:GITHUB_ENV
          echo "MONSTERASP_SERVER_USERNAME=$($env:MONSTERASP_SERVER_USERNAME.Trim())" >> $env:GITHUB_ENV
          echo "MONSTERASP_SERVER_PASSWORD=$($env:MONSTERASP_SERVER_PASSWORD.Trim())" >> $env:GITHUB_ENV

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: |
            client/package-lock.json
            server/package-lock.json

      # Do NOT run npm ci at repo root — postinstall recursively installs
      # server + client and breaks on Windows runners (EPERM / nested npm errors).

      - name: Install client dependencies
        run: npm ci --prefix client

      - name: Build client
        run: npm run build --prefix client

      - name: Install server production dependencies
        run: npm ci --omit=dev --prefix server

      - name: Assemble publish package
        shell: pwsh
        run: |
          $publish = "publish"
          Remove-Item -Recurse -Force $publish -ErrorAction SilentlyContinue
          # Do not create publish/data — live SQLite stays in wwwroot/data on server only.
          New-Item -ItemType Directory -Force -Path "$publish/logs", "$publish/client/dist" | Out-Null

          Copy-Item deploy/monsterasp/server.js $publish/
          Copy-Item deploy/monsterasp/web.config $publish/
          Copy-Item deploy/monsterasp/package.json $publish/

          Copy-Item -Recurse server/src "$publish/server/src"
          Copy-Item server/package.json "$publish/server/package.json"
          Copy-Item -Recurse server/node_modules "$publish/server/node_modules"

          Copy-Item -Recurse client/dist/* "$publish/client/dist/"

          $clientUrl = if ($env:CLIENT_URL) { $env:CLIENT_URL } else { "http://scaffolding-salary-management.runasp.net" }
          $jwt = $env:JWT_SECRET

          @"
          NODE_ENV=production
          JWT_SECRET=$jwt
          CLIENT_URL=$clientUrl
          DATABASE_PATH=./data/production.db
          "@ | Set-Content -Path "$publish/.env" -Encoding UTF8

          Write-Host "Publish package ready:"
          Get-ChildItem $publish -Recurse | Measure-Object | ForEach-Object { Write-Host "  $($_.Count) items" }

      - name: Resolve WebDeploy server URL
        id: webdeploy
        shell: pwsh
        run: |
          $site = $env:MONSTERASP_WEBSITE_NAME.Trim()
          $computer = $env:MONSTERASP_SERVER_COMPUTER_NAME
          if ([string]::IsNullOrWhiteSpace($computer)) {
            $computer = "https://${site}.siteasp.net:8172"
          } else {
            $computer = $computer.Trim().TrimEnd('/')
            # Accept full msdeploy.axd URL pasted by mistake — action needs host:port only
            $computer = $computer -replace '/msdeploy\.axd(\?.*)?$',''
          }
          Write-Host "WebDeploy server-computer-name: $computer"
          "computer_name=$computer" >> $env:GITHUB_OUTPUT

      # Same action that succeeded 2026-05-26. target-delete:false + skip data protects production.db
      - name: Deploy to MonsterASP.NET via WebDeploy
        uses: rasmusbuchholdt/simply-web-deploy@2.2.0
        with:
          website-name: ${{ secrets.MONSTERASP_WEBSITE_NAME }}
          server-computer-name: ${{ steps.webdeploy.outputs.computer_name }}
          server-username: ${{ secrets.MONSTERASP_SERVER_USERNAME }}
          server-password: ${{ secrets.MONSTERASP_SERVER_PASSWORD }}
          source-path: '\publish\'
          target-delete: false
          skip-directory-paths: data
